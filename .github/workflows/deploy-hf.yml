name: Deploy to HF Space

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face Space
        run: git push https://user:$HF_TOKEN@huggingface.co/spaces/mistral-hackaton-2026/meetingmind master:main --force
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
