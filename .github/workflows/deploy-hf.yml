name: Build & Deploy to HF Space

on:
  push:
    branches: [master]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            orchestrator/target
          key: cargo-${{ hashFiles('orchestrator/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build orchestrator
        run: cargo build --release --manifest-path orchestrator/Cargo.toml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build frontend
        run: npm ci && npm run build

      - name: Prepare deploy
        run: |
          mkdir -p deploy/static
          cp orchestrator/target/release/orchestrator deploy/orchestrator
          cp -r dist/. deploy/static/
          strip deploy/orchestrator
          ls -lh deploy/orchestrator
          cp README.md deploy/
          cp Dockerfile.hf deploy/Dockerfile

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd deploy
          git init
          git lfs install
          git lfs track "orchestrator"
          git add .
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git commit -m "Deploy $(git -C $GITHUB_WORKSPACE rev-parse --short HEAD)"
          git branch -M main
          git push --force https://user:$HF_TOKEN@huggingface.co/spaces/mistral-hackaton-2026/meetingmind main
